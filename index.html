<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой сайт</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        header{
            background:#1e293b;
            padding:20px;
            font-size:28px;
        }

        main{
            margin-top:100px;
        }

        button{
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:6px;
            background:#38bdf8;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0ea5e9;
        }
    </style>

</head>
<body>

<header>
    Мой первый сайт
</header>

<main>
    <h2>Добро пожаловать</h2>
    <p>Этот сайт сделан в одном HTML файле</p>

    <button onclick="showMessage()">Нажми</button>

    <p id="text"></p>
</main>

<script>
    function showMessage(){
        document.getElementById("text").innerText="Сайт работает нормально";
    }
</script>

</body>
</html>
